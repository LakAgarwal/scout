databases:
  - name: scout-db
    databaseName: scout_db
    user: scout
    plan: free

services:
  # 1. Spring Boot Java Backend Web Service
  - type: web
    name: scout-backend
    runtime: docker
    dockerfilePath: docker/Dockerfile.backend-java
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: scout-db
          property: connectionString
      - key: NEWSAPI_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # 2. React SPA Frontend Web Service (Served via Nginx)
  - type: web
    name: scout-frontend
    runtime: docker
    dockerfilePath: docker/Dockerfile.frontend-react
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
