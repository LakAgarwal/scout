services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: scout-backend
    runtime: docker
    dockerfilePath: docker/Dockerfile.backend
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # 2. Streamlit Frontend Web Service
  - type: web
    name: scout-frontend
    runtime: docker
    dockerfilePath: docker/Dockerfile.frontend
    plan: free
    envVars:
      - key: PORT
        value: "8501"
      - key: API_URL
        value: http://scout-backend:8000
