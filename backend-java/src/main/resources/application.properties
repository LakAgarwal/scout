# Server setup
server.port=8000

# Database Configuration
# Default values for local dev, overridden dynamically by DataSourceConfig if DATABASE_URL env var is present
spring.datasource.url=jdbc:postgresql://localhost:5432/scout_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate parameters
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.scout=DEBUG

# Gemini API configuration
gemini.api.key=${GEMINI_API_KEY:mock_key}
